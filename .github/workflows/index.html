<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: sans-serif; background: transparent; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 12px; }
  .card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
  .card-body { padding: 10px; }
  .price { font-weight: 600; font-size: 15px; margin: 0 0 4px; }
  .address { font-size: 13px; color: #666; margin: 0 0 8px; }
  .card a { display: block; text-align: center; font-size: 13px; padding: 6px; background: #f5f5f5; text-decoration: none; color: #333; }
</style>
</head>
<body>
<div class="grid" id="grid">Loading...</div>
<script>
fetch('listings.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('grid').innerHTML = data.length
      ? data.map(l => `
        <div class="card">
          <div class="card-body">
            <p class="price">${l.price || 'Price on request'}</p>
            <p class="address">${l.address}</p>
          </div>
          <a href="https://www.ratemyagent.com.au${l.url}" target="_blank">View listing</a>
        </div>`).join('')
      : '<p style="padding:1rem;color:#999">No listings found.</p>';
  });
</script>
</body>
</html>
